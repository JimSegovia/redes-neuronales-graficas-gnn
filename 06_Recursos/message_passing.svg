<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 290" width="100%" style="font-family:'Segoe UI',Arial,sans-serif">
<defs>
<filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
<linearGradient id="gh" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
<linearGradient id="gb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/></linearGradient>
<linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
<linearGradient id="gr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef2f2"/><stop offset="100%" stop-color="#fecaca"/></linearGradient>
<linearGradient id="go" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffedd5"/><stop offset="100%" stop-color="#fed7aa"/></linearGradient>
<linearGradient id="gp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f3e8ff"/><stop offset="100%" stop-color="#e9d5ff"/></linearGradient>
<linearGradient id="gt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ccfbf1"/><stop offset="100%" stop-color="#99f6e4"/></linearGradient>
</defs>
<rect x="0" y="0" width="1100" height="290" fill="#f8fafc" rx="10"/>
<rect x="10" y="8" width="1080" height="34" fill="url(#gh)" rx="6"/>
<text x="550" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Mecanismo de Message Passing en GNN</text>
<rect x="30" y="55" width="280" height="150" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="8"/>
<rect x="35" y="60" width="270" height="28" fill="url(gr)" rx="5"/><text x="170" y="79" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Paso 1 - AGGREGATE</text>
<rect x="40" y="95" width="260" height="40" fill="#f8fafc" rx="5" filter="url(#s)"/><text x="170" y="112" text-anchor="middle" fill="#475569" font-size="10">Cada nodo recibe mensajes</text>
<text x="170" y="128" text-anchor="middle" fill="#475569" font-size="10">de sus vecinos</text>
<rect x="40" y="145" width="260" height="40" fill="url(gb)" rx="5" stroke="#cbd5e1" stroke-width="1"/><text x="170" y="162" text-anchor="middle" fill="#1e3a5f" font-size="11" font-weight="bold">m_v = SUMA(h_u)</text>
<text x="170" y="178" text-anchor="middle" fill="#1e3a5f" font-size="11" font-weight="bold">para u en N(v)</text>
<text x="385" y="145" text-anchor="middle" fill="#94a3b8" font-size="18" font-weight="bold">&#8594;</text>
<rect x="420" y="55" width="280" height="150" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="8"/>
<rect x="425" y="60" width="270" height="28" fill="url(gg)" rx="5"/><text x="560" y="79" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Paso 2 - COMBINE</text>
<rect x="430" y="95" width="260" height="40" fill="#f8fafc" rx="5" filter="url(#s)"/><text x="560" y="112" text-anchor="middle" fill="#475569" font-size="10">Actualiza estado del nodo</text>
<text x="560" y="128" text-anchor="middle" fill="#475569" font-size="10">fusionando informacion</text>
<rect x="430" y="145" width="260" height="40" fill="url(gg)" rx="5" stroke="#cbd5e1" stroke-width="1"/><text x="560" y="162" text-anchor="middle" fill="#1e3a5f" font-size="11" font-weight="bold">h_v&#x27; = sigma(W[h_v||m_v])</text>
<text x="775" y="145" text-anchor="middle" fill="#94a3b8" font-size="18" font-weight="bold">&#8594;</text>
<rect x="810" y="55" width="280" height="150" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="8"/>
<rect x="815" y="60" width="270" height="28" fill="url(gp)" rx="5"/><text x="950" y="79" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Paso 3 - READOUT</text>
<rect x="820" y="95" width="260" height="40" fill="#f8fafc" rx="5" filter="url(#s)"/><text x="950" y="112" text-anchor="middle" fill="#475569" font-size="10">Embedding final del grafo</text>
<text x="950" y="128" text-anchor="middle" fill="#475569" font-size="10">tras K capas GNN</text>
<rect x="820" y="145" width="260" height="40" fill="url(gp)" rx="5" stroke="#cbd5e1" stroke-width="1"/><text x="950" y="162" text-anchor="middle" fill="#1e3a5f" font-size="11" font-weight="bold">h_G = POOL(h_1..h_n)</text>
<rect x="30" y="220" width="1040" height="45" fill="url(gb)" rx="8" stroke="#93c5fd" stroke-width="1"/><text x="550" y="240" text-anchor="middle" fill="#1e3a5f" font-size="11">Cada iteracion k propaga informacion 1 salto en el grafo. Tras K capas, cada nodo conoce su vecindario de K saltos</text>
<text x="550" y="254" text-anchor="middle" fill="#1e40af" font-size="10">&#8593; Este mecanismo permite que la GNN aprenda representaciones contextuales de los nodos</text>

</svg>